models:
  interactive:
    id: local_small
    max_ms: 1200
    max_tokens: 256
  quality:
    id: local_medium
    max_ms: 6000
    max_tokens: 1200
routing:
  local_first:
    target_local_token_ratio: 0.85
    escalate_if:
      - task: longform
        confidence_below: 0.55
  frugal_sovereign:
    enabled: true
    block_private_raw_cloud: true
    remote_allowed_privacy_classes:
      - public
    route_order:
      - rule_cache_memory
      - local_small
      - local_large
      - local_tools_rag
      - local_multi_agent_check
      - cloud_council
